spring.application.name=clikjaundice-backend
# Server
server.port=8080

# MySQL — update with your credentials
spring.datasource.url=jdbc:mysql://localhost:3306/clikjaundice_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Radhe123@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Image storage path on server
app.image.upload-dir=uploads/

# JWT secret key — change this to any long random string in production
app.jwt.secret=clikjaundice-super-secret-key-change-this-in-production-2024
app.jwt.expiration=604800000
# 604800000 ms = 7 days