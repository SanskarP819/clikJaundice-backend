spring.application.name=clikjaundice-backend

# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# MySQL — uses Railway environment variables
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:clikjaundice_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Radhe123@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Image storage
app.image.upload-dir=uploads/

# JWT
app.jwt.secret=${JWT_SECRET:clikjaundice-super-secret-key-change-this-in-production-2024}
app.jwt.expiration=604800000